<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRESCRIPT</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000814;
  color: #7fdfff;
  font-family: 'VT323', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.terminal {
  width: 800px;
  text-align: center;
}

.symbol {
  width: 120px;
  margin-bottom: 30px;
  filter: drop-shadow(0 0 8px #4cc9ff);
}

.meta {
  font-size: 20px;
  opacity: 0.7;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

.display {
  font-size: 32px;
  letter-spacing: 2px;
  min-height: 120px;
  white-space: pre-line;
  text-shadow: 0 0 6px #4cc9ff;
}

.status {
  margin-top: 20px;
  font-size: 26px;
  opacity: 0;
  transition: opacity 0.4s ease;
}

button {
  margin: 15px;
  padding: 10px 25px;
  background: transparent;
  border: 2px solid #7fdfff;
  color: #7fdfff;
  font-family: 'VT323', monospace;
  font-size: 22px;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  background: #7fdfff;
  color: #000814;
}

@keyframes flicker {
  0% { opacity: 1; }
  50% { opacity: 0.85; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.1s infinite;
}
</style>
</head>

<body>

<div class="terminal">
  <!-- Replace src with your actual Index symbol image -->
  <img src="index-symbol.png" class="symbol">

  <div class="meta" id="meta">Awaiting Prescript...</div>

  <div class="display" id="prescript"></div>

  <div class="status" id="status">_CLEAR.</div>

  <div>
    <button onclick="issuePrescript()">Receive Prescript</button>
    <button onclick="resetTerminal()">Reset</button>
  </div>
</div>

<script>

const verbs = [
  "Approach",
  "Observe",
  "Deliver",
  "Escort",
  "Disrupt",
  "Replace",
  "Mark",
  "Delay",
  "Preserve",
  "Confiscate"
];

const adjectives = [
  "designated",
  "unmarked",
  "forgotten",
  "misplaced",
  "errant",
  "silent",
  "fractured",
  "designated secondary",
  "unverified",
  "adjacent"
];

const nouns = [
  "individual",
  "location",
  "object",
  "subject",
  "entity",
  "structure",
  "process",
  "record",
  "witness",
  "container"
];

const conditions = [
  "without recognition",
  "prior to observation",
  "in the presence of witnesses",
  "before the third interval",
  "without deviation",
  "until instructed otherwise",
  "without acknowledging the result",
  "without confirming completion",
  "after verifying silence",
  "without generating suspicion"
];

function randomFrom(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function generatePrescript() {

  const line1 = `${randomFrom(verbs)} the ${randomFrom(adjectives)} ${randomFrom(nouns)}.`;

  const line2 = `Ensure compliance ${randomFrom(conditions)}.`;

  const line3 = `Failure to comply will result in reassignment.`;

  return `${line1}\n${line2}\n\n${line3}`;
}

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz ";

function shuffleReveal(element, finalText, callback) {
  let iteration = 0;
  element.classList.add("flicker");

  const interval = setInterval(() => {
    element.innerText = finalText
      .split("")
      .map((letter, index) => {
        if (index < iteration) {
          return finalText[index];
        }
        if (letter === "\n") return "\n";
        return chars[Math.floor(Math.random() * chars.length)];
      })
      .join("");

    if (iteration >= finalText.length) {
      clearInterval(interval);
      element.classList.remove("flicker");
      if (callback) callback();
    }

    iteration += 0.6;
  }, 20);
}

function issuePrescript() {
  const prescript = generatePrescript();
  const id = Math.floor(Math.random() * 999999);
  const timestamp = new Date().toISOString();

  document.getElementById("meta").innerText =
    `PRESCRIPT ID: ${id}   |   ISSUED: ${timestamp}`;

  document.getElementById("status").style.opacity = 0;

  shuffleReveal(
    document.getElementById("prescript"),
    prescript,
    () => {
      document.getElementById("status").style.opacity = 1;
    }
  );
}

function resetTerminal() {
  document.getElementById("prescript").innerText = "";
  document.getElementById("meta").innerText = "Awaiting Prescript...";
  document.getElementById("status").style.opacity = 0;
}

</script>

</body>
</html>
