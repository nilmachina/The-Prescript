<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRESCRIPT TERMINAL</title>

<style>
body {
  background: black;
  color: white;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.terminal {
  text-align: center;
  max-width: 800px;
}

.symbol {
  font-size: 48px;
  margin-bottom: 40px;
}

.meta {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 20px;
}

.text-display {
  font-size: 22px;
  letter-spacing: 3px;
}
</style>
</head>

<body>

<div class="terminal">
  <div class="symbol">⚖</div>
  <div class="meta" id="meta"></div>
  <div class="text-display" id="prescript"></div>
</div>

<script>
const verbs = [
  "ELIMINATE",
  "OBSERVE",
  "DELIVER",
  "APPROACH",
  "PROTECT",
  "INTERCEPT"
];

const objects = [
  "THE DESIGNATED TARGET",
  "THE MARKED INDIVIDUAL",
  "THE SPECIFIED LOCATION",
  "THE ASSIGNED SUBJECT",
  "THE DESIGNATED ENTITY"
];

const conditions = [
  "WITHOUT HESITATION",
  "IMMEDIATELY",
  "WITHOUT QUESTION",
  "WITHOUT DELAY",
  "IN SILENCE"
];

function generatePrescript() {
  const verb = verbs[Math.floor(Math.random() * verbs.length)];
  const object = objects[Math.floor(Math.random() * objects.length)];
  const condition = conditions[Math.floor(Math.random() * conditions.length)];

  return `${verb} ${object} ${condition}_CLEAR.`;
}

function generateMeta() {
  const id = Math.floor(Math.random() * 1000000);
  const timestamp = new Date().toISOString();
  return `PRESCRIPT ID: ${id} | ISSUED: ${timestamp}`;
}

const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ_ ";

function shuffleReveal(element, finalText) {
  let iteration = 0;

  const interval = setInterval(() => {
    element.innerText = finalText
      .split("")
      .map((letter, index) => {
        if (index < iteration) {
          return finalText[index];
        }
        return chars[Math.floor(Math.random() * chars.length)];
      })
      .join("");

    if (iteration >= finalText.length) {
      clearInterval(interval);
    }

    iteration += 0.5;
  }, 35);
}

window.onload = () => {
  const prescript = generatePrescript();
  document.getElementById("meta").innerText = generateMeta();
  shuffleReveal(document.getElementById("prescript"), prescript);
};
</script>

</body>
</html>
